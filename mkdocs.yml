site_name: iothings.io Documentation
site_url: https://iothings-io.github.io/
theme:
  name: material  # Ini tema paling populer dan profesional untuk dokumentasi
  features:
    - navigation.tabs      # Menu di bar atas
    - navigation.path      # INI UNTUK MENGAKTIFKAN BREADCRUMBS
    - navigation.sections  # Agar sidebar punya sekat rapi
    - search.suggest
  font:
    text: Roboto          # Font utama (Sangat bersih dan tajam)
    code: Roboto Mono     # Font untuk koding/perintah terminal
  palette:
    primary: indigo       # Warna bar atas
    accent: indigo        # Warna link/tombol
nav:
  - Beranda: index.md
  - Produk & Panduan:
      - Zigbee Gateway: gateway.md
      - RS485 Bridge: rs485.md
  - Marketplace: catalog.md
