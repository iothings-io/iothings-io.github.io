name: publish 
on:
  push:
    branches:
      - master 
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    # Memaksa penggunaan Node.js 24 untuk mematuhi standar baru GitHub 2026
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Mengambil seluruh riwayat agar deploy lebih stabil

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Menggunakan versi spesifik yang lebih stabil

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material
          pip install pymdown-extensions

      - name: Deploy to GitHub Pages
        run: |
          # Menambahkan konfigurasi git agar robot bisa melakukan commit ke gh-pages
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          mkdocs gh-deploy --force
